name: Build React Capacitor APK

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'android/**'
      - '.github/workflows/android.yml'
      - 'metadata.json'
      - 'README.md'
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - 'android/**'
      - '.github/workflows/android.yml'
      - 'metadata.json'
      - 'README.md'

jobs:
  build-capacitor:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Web Dependencies
      run: |
        npm install --legacy-peer-deps

    - name: Build React Web App
      run: |
        npm run build

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Capacitor and Build Android Project
      run: |
        # Temporarily rename existing native android folder to prevent naming conflict with Capacitor's android platform
        if [ -d "android" ]; then
          mv android android-native
        fi

        # Install Capacitor core, CLI, and android platform libraries
        npm install @capacitor/core @capacitor/cli @capacitor/android --save-dev

        # Initialize Capacitor configuration
        npx cap init "SafeScan" "com.safescan.app" --web-dir=dist

        # Add android platform to Capacitor
        npx cap add android

        # Add Kotlin resolution strategy to resolve duplicate class issues
        cat << 'EOF' >> android/build.gradle

allprojects {
    configurations.all {
        resolutionStrategy {
            force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
            force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
            force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
        }
    }
}
EOF

        # Sync assets and web build files to the native Android platform project
        npx cap sync android

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'
        build-root-directory: android

    - name: Build Capacitor APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: capacitor-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error

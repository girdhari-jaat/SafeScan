name: Build React Capacitor APK

on:
  workflow_dispatch:

jobs:
  build-capacitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Web Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor-community/media @capacitor/filesystem

      - name: Build React Web App
        run: |
          npm run build

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Capacitor and Build Android Project
        run: |
          # Install Capacitor core, CLI, and android platform libraries
          npm install @capacitor/core @capacitor/cli @capacitor/android --save-dev

          # Initialize Capacitor configuration if not already present
          if [ ! -f "capacitor.config.json" ]; then
            npx cap init "SafeScan" "com.safescan.app" --web-dir=dist
          fi

          # Add android platform to Capacitor only if it doesn't exist
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android folder already exists, skipping 'cap add'"
          fi

          # Sync assets and web build files to the native Android platform project
          npx cap sync android

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.5"
          build-root-directory: android

      - name: Build Capacitor APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: capacitor-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

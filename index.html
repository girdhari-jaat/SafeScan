<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SafeScan">
    <meta name="mobile-web-app-capable" content="yes">
    <title>SafeScan</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="/icon192.png">
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.tsx" defer></script>
    <script defer>
      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('SW registered', reg))
            .catch(err => console.error('SW registration failed', err));
        });
      }

      // Dynamic imports or chunk loading failure recovery
      window.addEventListener('vite:preloadError', (event) => {
        console.warn('Vite preload error detected, cleaning and recovering...', event);
        if (window.caches) {
          caches.keys().then((keys) => {
            for (const key of keys) caches.delete(key);
          }).finally(() => {
            window.location.reload();
          });
        } else {
          window.location.reload();
        }
      });

      window.addEventListener('error', (event) => {
        const msg = event.message || '';
        if (msg.includes('Failed to fetch dynamically imported module') || msg.includes('Importing a module script failed')) {
          console.warn('Dynamic import error detected, recovering...');
          window.location.reload();
        }
      }, true);
    </script>
  </body>
</html>
